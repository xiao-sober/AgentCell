# 此文件由 AgentCellSettings 和 Provider ModelSpec Schema 严格校验。
# API Key 只从对应环境变量读取。

[models.qwen_plus]
provider = "bailian"
model = "qwen3.7-plus"
api_key_env = "DASHSCOPE_API_KEY"
base_url = "https://dashscope.aliyuncs.com/compatible-mode/v1"
thinking = true
thinking_budget = 12000
max_output_tokens = 16000
timeout_seconds = 120
max_retries = 3

[models.deepseek_pro]
provider = "deepseek"
model = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
thinking = true
reasoning_effort = "high"
max_output_tokens = 16000
timeout_seconds = 120
max_retries = 3
